name: Flight Price Tracker

on:
  schedule:
    # Runs every 12 hours (00:00 and 12:00 UTC)
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  check-flights:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install serpapi==1.0.2

      - name: Debug SerpAPI
        run: |
          python -c "import serpapi; print('Location:', serpapi.__file__)"
          python -c "import serpapi; print('Version:', getattr(serpapi, '__version__', 'unknown'))"
          python -c "import serpapi; print('Has Client:', hasattr(serpapi, 'Client'))"
          python -c "import serpapi; print(dir(serpapi))"
          pip show serpapi

      - name: Run Flight Tracker
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          SHEETY_FLIGHTS: ${{ secrets.SHEETY_FLIGHTS }}
          FLIGHT_GOOGLE_CREATED_KEY: ${{ secrets.FLIGHT_GOOGLE_CREATED_KEY }}
          PERSONAL_EMAIL: ${{ secrets.PERSONAL_EMAIL }}
        run: python main.py